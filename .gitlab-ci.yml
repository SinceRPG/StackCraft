image: maven:3.9-eclipse-temurin-21

variables:
  # Thay thế URL Webhook của bạn vào đây
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/1459559029180465389/V33G3HEFpb4thBgw4AUMoOs7IpSFqqXdvIddUIQnxga3QX5IJBQFvlcGM8OXzvlPbQLA"
  # Định nghĩa đường dẫn cache local cho Maven để tăng tốc độ build
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # URL ảnh icon và thumbnail
  ICON_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"
  THUMBNAIL_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"

# Cấu hình cache thư viện Maven
cache:
  paths:
    - .m2/repository

stages:
  - build
  - notify

# --- STAGE 1: BUILD ---
build_job:
  stage: build
  script:
    # -B: Batch mode (ít log rác hơn), clean package: build ra file jar
    - mvn clean package -B
  artifacts:
    paths:
      - target/*.jar
    expire_in: never

# --- STAGE 2: NOTIFY SUCCESS (Chạy khi build thành công) ---
notify_success:
  stage: notify
  needs: [ "build_job" ]
  when: on_success
  before_script:
    - apt-get update && apt-get install -y git jq curl
  script:
    - |
      # 1. LẤY THÔNG TIN TỪ GIT VÀ POM.XML
      COMMIT_MSG=$(git log -1 --pretty=%B)
      AUTHOR=$(git log -1 --pretty=%an)
      HASH=$(git log -1 --pretty=%h)
      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      
      # Lấy Version từ pom.xml
      VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
      # Lấy Name từ pom.xml (hoặc dùng artifactId nếu name chưa set)
      NAME=$(mvn help:evaluate -Dexpression=project.name -q -DforceStdout)
      if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
        NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
      fi

      # 2. TẠO JSON EMBED (MÀU XANH)
      jq -n \
        --arg author "$AUTHOR pushed an update for $NAME" \
        --arg desc "$COMMIT_MSG" \
        --arg footer "Build Success • Version $VERSION • $HASH" \
        --arg timestamp "$TIMESTAMP" \
        --arg icon "$ICON_URL" \
        --arg thumb "$THUMBNAIL_URL" \
        '{
          username: "StackCraft Build",
          avatar_url: $icon,
          embeds: [{
            color: 5763719,
            author: { name: $author, icon_url: $icon },
            title: "Build Successful & Ready!",
            description: $desc,
            thumbnail: { url: $thumb },
            footer: { text: $footer },
            timestamp: $timestamp
          }]
        }' > success_payload.json

      # 3. GỬI EMBED TRƯỚC
      curl -H "Content-Type: application/json" -d @success_payload.json "$DISCORD_WEBHOOK_URL"
      
      # 4. UPLOAD FILE JAR NGAY SAU ĐÓ
      # Maven thường tạo ra file original-*.jar (file chưa shade), ta cần loại bỏ nó
      # Chỉ lấy file .jar chính trong thư mục target
      JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" ! -name "*-sources.jar" | head -n 1)
      
      if [ -f "$JAR_FILE" ]; then
        echo "Uploading $JAR_FILE..."
        curl -X POST -F "file=@$JAR_FILE" "$DISCORD_WEBHOOK_URL"
      else
        echo "Jar file not found inside target/ folder!"
      fi

# --- STAGE 2: NOTIFY FAILURE (Chạy khi build thất bại) ---
notify_failure:
  stage: notify
  needs: [ "build_job" ]
  when: on_failure
  before_script:
    - apt-get update && apt-get install -y git jq curl
  script:
    - |
      # 1. LẤY THÔNG TIN
      AUTHOR=$(git log -1 --pretty=%an)
      HASH=$(git log -1 --pretty=%h)
      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      JOB_URL="$CI_PROJECT_URL/-/jobs/$CI_JOB_ID"
      
      # Cố gắng lấy tên dự án, nếu lỗi thì để mặc định
      NAME=$(mvn help:evaluate -Dexpression=project.name -q -DforceStdout || echo "Plugin")

      # 2. TẠO JSON EMBED (MÀU ĐỎ)
      jq -n \
        --arg author "$AUTHOR broke the build for $NAME!" \
        --arg desc "The build failed. Please check the console logs." \
        --arg url "$JOB_URL" \
        --arg footer "Build Failed • $HASH" \
        --arg timestamp "$TIMESTAMP" \
        --arg icon "$ICON_URL" \
        '{
          username: "StackCraft Build",
          avatar_url: $icon,
          embeds: [{
            color: 15548997,
            author: { name: $author, icon_url: $icon },
            title: "Build Failed ❌",
            url: $url,
            description: $desc,
            footer: { text: $footer },
            timestamp: $timestamp
          }]
        }' > fail_payload.json

      # 3. GỬI CẢNH BÁO
      curl -H "Content-Type: application/json" -d @fail_payload.json "$DISCORD_WEBHOOK_URL"