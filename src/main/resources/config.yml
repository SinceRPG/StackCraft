settings:
  debug: false
  prefix: "<white>[ <yellow>STC</yellow> ]"
  # How often StackCraft processes queued players after pickups, block breaks, and mob kills.
  queue_interval_ticks: 5
  # Keep this disabled if players often need to uncraft items manually.
  auto_craft_schedule: false
  # How often StackCraft scans online players when scheduled auto-crafting is enabled.
  auto_craft_schedule_interval_ticks: 20
  # Drop crafted overflow near the player instead of deleting it when the inventory is full.
  drop_overflow_items: true

default_toggle_item:
  all: false
  per: false

toggle:
  coal: # Permission for this toggle command is stc.toggle.coal.
    display: "<gray>AutoCraft Coal"
    command: # Remove this section when this toggle should not have a standalone command.
      register: true # Register this alias when StackCraft loads or reloads.
      alias: coalcrafttoggle
    contain:
      - VANILLA;COAL;1
      - MMOITEMS;MATERIAL;COAL;1
      - MMOITEMS;MATERIAL;COAL_ORE;1
      - MMOITEMS;MATERIAL;COAL_BLOCK;1

craft:
  # Custom item formats:
  # ItemsAdder: ITEMSADDER;CUSTOM_ID;AMOUNT
  # Oraxen: ORAXEN;CUSTOM_ID;AMOUNT
  # MMOItems: MMOITEMS;TYPE;ID;AMOUNT
  # ExecutableItems: EXECUTABLEITEMS;ID;AMOUNT
  # Nexo: NEXO;ID;AMOUNT
  # ItemEdit: ITEMEDIT;ID;AMOUNT
  # MythicMobs: MYTHICMOBS;ID;AMOUNT
  # Vanilla: VANILLA;TYPE;AMOUNT
  VANILLA;COAL;1:
    # When required_all is true, every ingredient below is consumed together for each craft.
    required_all: true
    ingredient:
      - VANILLA;COAL_ORE;1 # 1 coal ore -> 1 coal
      - VANILLA;COAL_BLOCK;1 # 1 coal block -> 1 coal
  MMOITEMS;MATERIAL;COAL;1:
    # When required_all is false or missing, any matching ingredient can craft the result.
    required_all: true
    ingredient:
      - VANILLA;COAL;64 # 64 vanilla coal -> 1 MMOItems custom coal
      - VANILLA;COAL_BLOCK;64 # 64 vanilla coal block -> 1 MMOItems custom coal
  MMOITEMS;MATERIAL;COAL_ORE;1:
    ingredient:
      - MMOITEMS;MATERIAL;COAL;64
  MMOITEMS;MATERIAL;COAL_BLOCK;1:
    ingredient:
      - MMOITEMS;MATERIAL;COAL_ORE;64
