settings:
  debug: false
  prefix: "<white>[ <yellow>STC</yellow> ]"
  #Disable auto craft active by schedule
  #At sometimes player needs uncraft item to do sth, so it will be Auto craft again…
  auto_craft_schedule: false

default_toggle_item:
  all: false
  per: false

toggle:
  coal: #permission for player can use command is stc.toggle.coal
    display: "<gray>AutoCraft Coal"
    command: #If you don't want to use command for this, you can delete this
      register: true #If true -> command will register after player rejoin
      alias: coalcrafttoggle #command
    contain:
      - VANILLA;COAL;1
      - MMOITEMS;MATERIAL;COAL;1
      - MMOITEMS;MATERIAL;COAL_ORE;1
      - MMOITEMS;MATERIAL;COAL_BLOCK;1

craft:
  # Custom item:
  # ItemsAdder: ITEMSADDER;CUSTOM_ID;AMOUNT
  # Oraxen: ORAXEN;CUSTOM_ID;AMOUNT
  # MMOItems: MMOITEMS;TYPE;ID;AMOUNT
  # ExecutableItems: EXECUTABLEITEMS;ID;AMOUNT
  # Nexo: NEXO;ID;AMOUNT
  # ItemEdit: ITEMEDIT;ID;AMOUNT
  # MythicMobs: MYTHICMOBS;ID;AMOUNT
  # Vanilla: VANILLA;TYPE;AMOUNT
  VANILLA;COAL;1:
    # When required_all: true, you will need all items below ingredient to craft - default is false
    required_all: true
    ingredient:
      - VANILLA;COAL_ORE;1 #1 coal_ore -> 1 coal
      - VANILLA;COAL_BLOCK;1 #1 coal_block -> 1 coal
  MMOITEMS;MATERIAL;COAL;1:
    # When required_all: true, you will need all items below ingredient to craft - default is false
    required_all: true
    ingredient:
      - VANILLA;COAL;64 #64 vanilla coal -> 1 mmoitems custom coal
      - VANILLA;COAL_BLOCK;64 #64 vanilla coal block -> 1 mmoitems custom coal
  MMOITEMS;MATERIAL;COAL_ORE;1:
    ingredient:
      - MMOITEMS;MATERIAL;COAL;64
  MMOITEMS;MATERIAL;COAL_BLOCK;1:
    ingredient:
      - MMOITEMS;MATERIAL;COAL_ORE;64